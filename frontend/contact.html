<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Genius Coding Academy</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">
    <div class="max-w-3xl mx-auto p-6 bg-white shadow-xl rounded-lg max-w-[350px] max-h-[625px] overflow-auto">
        <h2 class="text-3xl font-bold text-gray-800 text-center mb-4">Contact Us</h2>
        <p class="text-gray-600 text-center mb-4">Have questions or feedback? We'd love to hear from you!</p>

        <div id="alert-box" class="mt-4 text-center px-4 py-2 rounded-lg text-white hidden"></div>
        <br>

        <form id="contactForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Name</label>
                <input type="text" name="name" placeholder="Your Name" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring focus:ring-indigo-400 bg-white">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">Email</label>
                <input type="email" name="email" placeholder="Your Email" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring focus:ring-indigo-400 bg-white">
            </div>

            <div>
                <label class="block text-gray-700 font-medium mb-1">Message</label>
                <textarea name="message" placeholder="Your Message" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg h-28 focus:outline-none focus:ring focus:ring-indigo-400 bg-white"></textarea>
            </div>

            <button type="submit"
                class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-lg text-lg transition font-bold shadow-md">Send Message</button>
        </form>

        <div class="text-center mt-6">
            <p class="text-gray-600 text-sm">Or reach us at:</p>
            <p class="text-indigo-600 font-semibold mt-1">contact.geniuscodingacademy@gmail.com</p>
            <p class="text-gray-600 text-sm mt-0.5">+91 75969 33495</p>
            <a href="./index.html" class="text-gray-500 text-xs hover:underline mt-4 inline-block">← Back to Home</a>
        </div>

            <script>
                // Check for URL parameters to show messages
                window.addEventListener('DOMContentLoaded', () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const message = urlParams.get('message');
                    const type = urlParams.get('type') || 'success';

                    if (message) {
                        const alertBox = document.getElementById("alert-box");
                        alertBox.textContent = message;
                        alertBox.classList.remove("hidden");
                        alertBox.classList.add(type === 'success' ? 'bg-green-500' : 'bg-red-500');

                        setTimeout(() => {
                            alertBox.style.transition = "opacity 1s";
                            alertBox.style.opacity = "0";
                            setTimeout(() => alertBox.classList.add("hidden"), 1000);
                        }, 3000);
                    }
                });

                document.getElementById('contactForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const alertBox = document.getElementById("alert-box");
                    const formData = new FormData(e.target);
                    const body = Object.fromEntries(formData);

                    try {
                        const response = await fetch(`${window.API_BASE_URL}/contact`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });

                        if (response.ok) {
                            alertBox.textContent = "Message sent successfully!";
                            alertBox.classList.remove("hidden", "bg-red-500");
                            alertBox.classList.add("bg-green-500");
                            e.target.reset();
                        } else {
                            alertBox.textContent = "Failed to send message.";
                            alertBox.classList.remove("hidden", "bg-green-500");
                            alertBox.classList.add("bg-red-500");
                        }
                    } catch (err) {
                        console.error(err);
                        alertBox.textContent = "Connection error.";
                        alertBox.classList.remove("hidden");
                        alertBox.classList.add("bg-red-500");
                    }
                };
            </script>
</body>

</html>
