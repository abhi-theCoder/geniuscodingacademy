<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Genius Coding Academy</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-blue-500 to-purple-600 min-h-screen flex items-center justify-center">
    <div class="max-w-3xl mx-auto p-6 bg-white shadow-xl rounded-lg max-w-[350px] max-h-[625px] overflow-auto">
        <h2 class="text-3xl font-bold text-gray-800 text-center mb-4">Contact Us</h2>
        <p class="text-gray-600 text-center mb-4">Have questions or feedback? We'd love to hear from you!</p>

        <div id="alert-box" class="mt-4 text-center px-4 py-2 rounded-lg text-white hidden"></div>
        <br>

        <form action="/contact" method="POST" class="space-y-1">
            <div>
                <label class="block text-gray-700 font-medium">Name</label>
                <input type="text" name="name"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required>
            </div>

            <div>
                <label class="block text-gray-700 font-medium">Email</label>
                <input type="email" name="email"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required>
            </div>

            <div>
                <label class="block text-gray-700 font-medium">Contact Number</label>
                <form id="contactForm" class="mt-6 space-y-4">
                    <input type="text" name="name" placeholder="Your Name" required
                        class="w-full px-4 py-3 border border-indigo-300 rounded-lg focus:outline-none focus:ring focus:ring-indigo-400">
                    <input type="email" name="email" placeholder="Your Email" required
                        class="w-full px-4 py-3 border border-indigo-300 rounded-lg focus:outline-none focus:ring focus:ring-indigo-400">
                    <textarea name="message" placeholder="Your Message" required
                        class="w-full px-4 py-3 border border-indigo-300 rounded-lg h-32 focus:outline-none focus:ring focus:ring-indigo-400"></textarea>
                    <button type="submit"
                        class="w-full bg-indigo-500 text-white py-3 rounded-lg text-lg hover:bg-indigo-600">Send
                        Message</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-gray-600">Or reach us at:</p>
                    <p class="text-blue-600 font-semibold">contact.geniuscodingacademy@gmail.com</p>
                    <p class="text-gray-600">+91 75969 33495</p>
                    <div class="flex justify-center mt-3 space-x-4">
                        <a href="#" class="text-blue-500 hover:text-blue-700"><i class="fab fa-facebook fa-2x"></i></a>
                        <a href="#" class="text-blue-400 hover:text-blue-600"><i class="fab fa-twitter fa-2x"></i></a>
                        <a href="#" class="text-pink-500 hover:text-pink-700"><i class="fab fa-instagram fa-2x"></i></a>
                    </div>
                    <a href="./index.html" class="text-gray-500 text-sm hover:underline mt-4 inline-block">← Back to
                        Home</a>
                </div>
            </div>

            <script>
                // Check for URL parameters to show messages
                window.addEventListener('DOMContentLoaded', () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const message = urlParams.get('message');
                    const type = urlParams.get('type') || 'success';

                    if (message) {
                        const alertBox = document.getElementById("alert-box");
                        alertBox.textContent = message;
                        alertBox.classList.remove("hidden");
                        alertBox.classList.add(type === 'success' ? 'bg-green-500' : 'bg-red-500');

                        setTimeout(() => {
                            alertBox.style.transition = "opacity 1s";
                            alertBox.style.opacity = "0";
                            setTimeout(() => alertBox.classList.add("hidden"), 1000);
                        }, 3000);
                    }
                });

                document.getElementById('contactForm').onsubmit = async (e) => {
                    e.preventDefault();
                    const alertBox = document.getElementById("alert-box");
                    const formData = new FormData(e.target);
                    const body = Object.fromEntries(formData);

                    try {
                        const response = await fetch(`${window.API_BASE_URL}/contact`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(body)
                        });

                        if (response.ok) {
                            alertBox.textContent = "Message sent successfully!";
                            alertBox.classList.remove("hidden", "bg-red-500");
                            alertBox.classList.add("bg-green-500");
                            e.target.reset();
                        } else {
                            alertBox.textContent = "Failed to send message.";
                            alertBox.classList.remove("hidden", "bg-green-500");
                            alertBox.classList.add("bg-red-500");
                        }
                    } catch (err) {
                        console.error(err);
                        alertBox.textContent = "Connection error.";
                        alertBox.classList.remove("hidden");
                        alertBox.classList.add("bg-red-500");
                    }
                };
            </script>
</body>

</html>
